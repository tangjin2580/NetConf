name: Build and Release Medical Network Tool

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 获取版本号
  get-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_version.outputs.NEW_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get or create version
        id: get_version
        run: |
          git fetch --tags
          TAGS=$(git tag -l "v*.*.*" 2>/dev/null | sort -V -r | head -1)

          if [ -n "$TAGS" ]; then
            VERSION=${TAGS#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="v$MAJOR.$MINOR.$NEW_PATCH"
          else
            NEW_VERSION="v1.0.0"
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

  # Win7 兼容版本 - Python 3.8
  build-win7:
    runs-on: windows-latest
    needs: get-version
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Pillow>=9.0.0,<10.0.0" "requests>=2.28.0,<3.0.0" "pyinstaller>=5.13.0,<6.0.0"

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name="医保网络配置工具-Win7" main.py

      - name: Create Win7 package
        run: |
          mkdir -p dist/Win7
          cp dist/*.exe dist/Win7/ 2>/dev/null || cp "dist/医保网络配置工具-Win7.exe" dist/Win7/
          cat > dist/Win7/安装运行库.bat << 'EOF'
          @echo off
          chcp 65001 > nul
          echo 正在打开运行库下载页面...
          start https://aka.ms/vs/17/release/vc_redist.x64.exe
          start https://aka.ms/vs/17/release/vc_redist.x86.exe
          pause
          EOF

      - name: Upload Win7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win7-Build
          path: dist/Win7/
          retention-days: 30

  # Win10/11 优化版本 - Python 3.11
  build-win10:
    runs-on: windows-latest
    needs: get-version
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow requests pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name="医保网络配置工具-Win10" main.py

      - name: Create Win10 package
        run: |
          mkdir -p dist/Win10
          cp dist/*.exe dist/Win10/ 2>/dev/null || cp "dist/医保网络配置工具-Win10.exe" dist/Win10/

      - name: Upload Win10 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win10-Build
          path: dist/Win10/
          retention-days: 30

  # 创建 Release
  create-release:
    needs: [get-version, build-win7, build-win10]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Organize files
        run: |
          mkdir -p release
          # 复制 Win7 文件
          cp ./artifacts/Win7-Build/*.exe release/
          cp ./artifacts/Win7-Build/*.bat release/
          # 复制 Win10 文件
          cp ./artifacts/Win10-Build/*.exe release/
          
          # 显示文件列表
          echo "=== Release files ==="
          ls -lh release/

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get-version.outputs.new_version }}
          release_name: 医保网络配置工具 ${{ needs.get-version.outputs.new_version }}
          body: |
            ## 医保网络配置工具 ${{ needs.get-version.outputs.new_version }}

            ### 选择适合您的版本

            | 版本 | Python | 适用系统 | 推荐场景 |
            |------|--------|---------|---------|
            | **Win10/11** | 3.11 | Windows 10/11 | 推荐大多数用户使用 |
            | **Win7兼容** | 3.8 | Windows 7 SP1+ / 8.1 / 10 | 旧系统用户 |

            ---

            ### Win7 兼容版本
            **适用系统**: Windows 7 SP1+ / 8.1 / 10

            #### 系统要求
            - Windows 7 SP1 或更高版本
            - **必须安装 KB2533623 更新** ([下载地址](https://www.microsoft.com/zh-cn/download/details.aspx?id=26764))
            - Visual C++ 运行库

            ---

            ### 主要功能
            - 医保网络检测（ping + 连通性测试）
            - 双WAN配置（路由器模式）
            - 单机配置（直连模式）
            - Hosts文件管理
            - 配置信息服务器（支持在线编辑）
            - 防护软件安装检测

            ### 使用说明
            1. 选择适合您系统的版本下载
            2. Win7用户请先安装运行库和KB2533623更新
            3. 右键以管理员身份运行
          draft: false
          prerelease: false
          files: |
            release/*.exe
            release/*.bat