name: Build and Release Medical Network Tool

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

# 完整的打包工作流
jobs:
  # ========================================
  # 步骤1: 获取版本号 (并行执行)
  # ========================================
  get-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_version.outputs.NEW_VERSION }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get or create version
      id: get_version
      run: |
        # 获取所有标签
        git fetch --tags
        TAGS=$(git tag -l "v*.*.*" 2>/dev/null | sort -V -r | head -1)
        
        if [ -n "$TAGS" ]; then
          VERSION=${TAGS#v}
          # 增加版本号
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v$MAJOR.$MINOR.$NEW_PATCH"
        else
          NEW_VERSION="v1.0.0"
        fi
        
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Generated version: $NEW_VERSION"

  # ========================================
  # 步骤2: Win7 兼容版本 - Python 3.8
  # ========================================
  build-win7:
    runs-on: windows-latest
    needs: get-version
    env:
      NEW_VERSION: ${{ needs.get-version.outputs.NEW_VERSION }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.8 for Win7
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'

    - name: Install dependencies for Win7
      run: |
        python -m pip install --upgrade pip
        pip install "Pillow>=9.0.0,<10.0.0"
        pip install "requests>=2.28.0,<3.0.0"
        pip install "pyinstaller>=5.13.0,<6.0.0"
        pip install "setuptools>=65.0.0"

    - name: Build Win7 executable
      run: |
        if (Test-Path "Conf-win7.spec") {
            pyinstaller --clean Conf-win7.spec --noconfirm
        } else {
            Write-Host "使用命令行模式构建Win7版本..."
            pyinstaller --clean --onefile --windowed `
              --name="医保网络配置工具-Win7" `
              --hidden-import=config.settings `
              --hidden-import=config `
              --hidden-import=core.network `
              --hidden-import=core.hosts `
              --hidden-import=core.system `
              --hidden-import=utils.cache `
              --hidden-import=utils.server `
              --hidden-import=utils `
              --hidden-import=PIL `
              --hidden-import=requests `
              --hidden-import=charset_normalizer `
              --hidden-import=idna `
              --hidden-import=urllib3 `
              --hidden-import=certifi `
              --hidden-import=openssl `
              --collect-all=PIL `
              --collect-all=requests `
              --add-data "config;config" `
              --add-data "core;core" `
              --add-data "utils;utils" `
              main.py
        }

    - name: Create Win7 package
      run: |
        # 创建输出目录
        New-Item -ItemType Directory -Path "dist/Win7" -Force | Out-Null
        
        # 查找并复制exe文件
        $exeFiles = Get-ChildItem -Path "dist" -Filter "*.exe" -Recurse
        foreach ($exe in $exeFiles) {
            if ($exe.Name -like "*Win7*") {
                Copy-Item $exe.FullName "dist/Win7/"
                Write-Host "Copied: $($exe.Name)"
            }
        }
        
        # 如果没有特定命名的，使用第一个找到的
        if ((Get-ChildItem "dist/Win7" -Filter "*.exe").Count -eq 0) {
            $firstExe = Get-ChildItem -Path "dist" -Filter "*.exe" -Recurse | Select-Object -First 1
            if ($firstExe) {
                Copy-Item $firstExe.FullName "dist/Win7/医保网络配置工具-Win7.exe"
                Write-Host "Copied as: 医保网络配置工具-Win7.exe"
            }
        }
        
        # 创建运行库安装脚本
        $batContent = @"
        @echo off
        chcp 65001 > nul
        echo ========================================
        echo   正在检查运行库...
        ========================================
        echo.
        echo Windows 7 用户请确保已安装 KB2533623 更新
        echo 下载: https://www.microsoft.com/zh-cn/download/details.aspx?id=26764
        echo.
        echo 正在下载 Visual C++ 运行库...
        echo.
         -Command "Start-Process -FilePath 'https://aka.ms/vs/17/release/vc_redist.x64.exe' -Verb Open"
        powershell -Command "Start-Process -FilePath 'https://aka.ms/vs/17/release/vc_redist.x86.exe' -Verb Open"
        echo.
        echo 请在新窗口中安装运行库，然后运行主程序
        echo.
        pause
        "@
        $batContent | Out-File -FilePath "dist/Win7/安装运行库.bat" -Encoding UTF8

    - name: Upload Win7 artifact
      uses: actions/upload-artifact@v4
      with:
        name: Win7-Build
        path: dist/Win7/
        retention-days: 30

  # ========================================
  # 步骤3: Win10/11 优化版本 - Python 3.11
  # ========================================
  build-win10:
    runs-on: windows-latest
    needs: get-version
    env:
      NEW_VERSION: ${{ needs.get-version.outputs.NEW_VERSION }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11 for Win10
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies for Win10
      run: |
        python -m pip install --upgrade pip
        pip install Pillow requests pyinstaller setuptools wheel

    - name: Build Win10 executable
      run: |
        if (Test-Path "Conf-win10.spec") {
            pyinstaller --clean Conf-win10.spec --noconfirm
        } else {
            Write-Host "使用命令行模式构建Win10版本..."
            pyinstaller --clean --onefile --windowed `
              --name="医保网络配置工具-Win10" `
              --hidden-import=config.settings `
              --hidden-import=config `
              --hidden-import=core.network `
              --hidden-import=core.hosts `
              --hidden-import=core.system `
              --hidden-import=utils.cache `
              --hidden-import=utils.server `
              --hidden-import=utils `
              --hidden-import=PIL `
              --hidden-import=requests `
              --hidden-import=charset_normalizer `
              --hidden-import=idna `
              --hidden-import=urllib3 `
              --hidden-import=certifi `
              --hidden-import=openssl `
              --collect-all=PIL `
              --collect-all=requests `
              --add-data "config;config" `
              --add-data "core;core" `
              --add-data "utils;utils" `
              main.py
        }

    - name: Create Win10 package
      run: |
        # 创建输出目录
        New-Item -ItemType Directory -Path "dist/Win10" -Force | Out-Null
        
        # 查找并复制exe文件
        $exeFiles = Get-ChildItem -Path "dist" -Filter "*.exe" -Recurse
        foreach ($exe in $exeFiles) {
            if ($exe.Name -like "*Win10*") {
                Copy-Item $exe.FullName "dist/Win10/"
                Write-Host "Copied: $($exe.Name)"
            }
        }
        
        # 如果没有特定命名的，使用第一个找到的
        if ((Get-ChildItem "dist/Win10" -Filter "*.exe").Count -eq 0) {
            $firstExe = Get-ChildItem -Path "dist" -Filter "*.exe" -Recurse | Select-Object -First 1
            if ($firstExe) {
                Copy-Item $firstExe.FullName "dist/Win10/医保网络配置工具-Win10.exe"
                Write-Host "Copied as: 医保网络配置工具-Win10.exe"
            }
        }

    - name: Upload Win10 artifact
      uses: actions/upload-artifact@v4
      with:
        name: Win10-Build
        path: dist/Win10/
        retention-days: 30

  # ========================================
  # 步骤4: 创建 Release (合并两个构建结果)
  # ========================================
  create-release:
    needs: [get-version, build-win7, build-win10]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Win7 artifact
      uses: actions/download-artifact@v4
      with:
        name: Win7-Build
        path: dist/Win7

    - name: Download Win10 artifact
      uses: actions/download-artifact@v4
      with:
        name: Win10-Build
        path: dist/Win10

    - name: List downloaded files
      run: |
        echo "Win7 files:"
        ls -la dist/Win7/
        echo ""
        echo "Win10 files:"
        ls -la dist/Win10/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.get-version.outputs.new_version }}
        release_name: 医保网络配置工具 ${{ needs.get-version.outputs.new_version }}
        body: |
          ## 医保网络配置工具 ${{ needs.get-version.outputs.new_version }}

          ### 选择适合您的版本

          | 版本 | Python | 适用系统 | 推荐场景 |
          |------|--------|---------|---------|
          | **Win10/11** | 3.11 | Windows 10/11 | 推荐大多数用户使用 |
          | **Win7兼容** | 3.8 | Windows 7 SP1+ / 8.1 / 10 | 旧系统用户 |

          ---

          ### Win10/11 版本 (推荐)
          - 性能优化
          - 支持最新功能
          - 推荐大多数用户使用

          ### Win7 兼容版本
          **适用系统**: Windows 7 SP1+ / 8.1 / 10

          #### 系统要求
          - Windows 7 SP1 或更高版本
          - **必须安装 KB2533623 更新** ([下载地址](https://www.microsoft.com/zh-cn/download/details.aspx?id=26764))
          - Visual C++ 运行库

          #### 下载运行库
          - [vc_redist.x64.exe](https://aka.ms/vs/17/release/vc_redist.x64.exe)
          - [vc_redist.x86.exe](https://aka.ms/vs/17/release/vc_redist.x86.exe)

          ---

          ### 主要功能
          - 医保网络检测（ping + 连通性测试）
          - 双WAN配置（路由器模式）
          - 单机配置（直连模式）
          - Hosts文件管理
          - 配置信息服务器（支持在线编辑）
          - 防护软件安装检测

          ### 使用说明
          1. 选择适合您系统的版本下载
          2. Win7用户请先安装运行库和KB2533623更新
          3. 右键以管理员身份运行
        draft: false
        prerelease: false

    - name: Upload Win7 Executable
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.get-version.outputs.new_version }}
        assets: dist/Win7/*.exe
      continue-on-error: true

    - name: Upload Win10 Executable
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ needs.get-version.outputs.new_version }}
        assets: dist/Win10/*.exe
      continue-on-error: true
