name: Build and Release (Go)

on:
  push:
    branches: [main, refactor-go]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: 生成 Windows 资源(manifest + 图标)并交叉编译
        run: |
          export GOTOOLCHAIN=go1.21.13
          go run github.com/akavel/rsrc@latest -arch amd64 -manifest app.manifest -ico icon.ico -o rsrc.syso
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -H windowsgui" -o NetConf.exe .

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: NetConf-Windows
          path: NetConf.exe

      - name: 创建 Release（自动构建）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-${{ github.run_number }}
          name: 自动构建 #${{ github.run_number }}
          prerelease: true
          files: NetConf.exe
