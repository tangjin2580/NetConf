name: Build and Release Medical Network Tool

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 获取版本号
  get-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.get_version.outputs.NEW_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get or create version
        id: get_version
        run: |
          git fetch --tags
          TAGS=$(git tag -l "v*.*.*" 2>/dev/null | sort -V -r | head -1)

          if [ -n "$TAGS" ]; then
            VERSION=${TAGS#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="v$MAJOR.$MINOR.$NEW_PATCH"
          else
            NEW_VERSION="v1.0.0"
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT

  # Win7 兼容版本 (x64) - Python 3.8，运行库内置，免安装
  build-win7:
    runs-on: windows-latest
    needs: get-version
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Pillow>=9.0.0,<10.0.0" "requests>=2.28.0,<3.0.0" "pyinstaller>=5.13.0,<6.0.0"

      # 使用项目内的 spec：win_private_assemblies=True 会把 CRT 一并打包，目标机免安装
      - name: Build executable (运行库内置)
        run: |
          pyinstaller Conf-win7.spec --noconfirm

      - name: 复制运行库说明（含未打 SP1 的早期 Win7 兜底）
        run: |
          cp "运行库已内置-无需安装.txt" "dist/医保网络配置工具-Win7/"

      - name: Upload Win7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win7-Build
          path: dist/医保网络配置工具-Win7/
          retention-days: 30

  # Win10/11 优化版本 - Python 3.11
  build-win10:
    runs-on: windows-latest
    needs: get-version
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Pillow>=9.0.0,<10.0.0" "requests>=2.28.0,<3.0.0" "pyinstaller>=6.0.0"

      # 使用项目内的 Conf-win10.spec（upx=False 关闭压缩）。Win10/11 自带 Universal CRT，
      # PyInstaller 会自动收集 vcruntime140/msvcp140，目标机同样免安装运行库。
      - name: Build executable (运行库一并内置)
        run: |
          pyinstaller Conf-win10.spec --noconfirm

      - name: Upload Win10 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Win10-Build
          path: dist/医保网络配置工具-Win10/
          retention-days: 30

  # 创建 Release
  create-release:
    needs: [get-version, build-win7, build-win10]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Organize & zip
        run: |
          mkdir -p release
          # Win7 x64 绿色版（运行库已内置，免安装）
          (cd ./artifacts/Win7-Build && zip -r ../../release/医保网络配置工具-Win7.zip .)
          # Win10/11 版
          (cd ./artifacts/Win10-Build && zip -r ../../release/医保网络配置工具-Win10.zip .)

          echo "=== Release files ==="
          ls -lh release/

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get-version.outputs.new_version }}
          release_name: 医保网络配置工具 ${{ needs.get-version.outputs.new_version }}
          body: |
            ## 医保网络配置工具 ${{ needs.get-version.outputs.new_version }}

            ### 选择适合您的版本

            | 版本 | 适用系统 | 推荐场景 |
            |------|---------|---------|
            | **Win7 兼容** | 64 位 Windows 7 SP1+ / 8.1 / 10 | 旧电脑（运行库已内置） |
            | **Win10/11** | Windows 10 / 11 | 新电脑 |

            > **运行库已内置**：以上版本均已将 Visual C++ 运行库与 Universal CRT 打包进程序，
            > 客户机**无需安装任何运行库**，解压后直接双击即可运行。

            ---

            ### ⚠️ 老电脑特别说明
            - 本版本为 **64 位**，请确认客户机为 64 位系统（右键「计算机」→ 属性查看）。
            - 建议系统至少为 **Windows 7 SP1**。如仍提示缺少 dll，可离线安装
              [KB2533623](https://www.microsoft.com/zh-cn/download/details.aspx?id=26764)
              与 [Win7 SP1](https://www.catalog.update.microsoft.com/)（均为离线包，无需联网升级）。
            - 个别老旧杀毒软件可能误报，加入白名单即可。

            ---

            ### 主要功能
            - 医保网络检测（ping + 连通性测试）
            - 双WAN配置（路由器模式）
            - 单机配置（直连模式）
            - Hosts文件管理
            - 配置信息服务器（支持在线编辑）
            - 防护软件安装检测

            ### 使用说明
            1. 按系统位数选择对应版本下载并解压
            2. **右键「以管理员身份运行」**（本工具需要修改网络/hosts，必须管理员权限）
            3. 如被杀软拦截，请允许/加入白名单
          draft: false
          prerelease: false
          files: |
            release/*.zip